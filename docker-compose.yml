services:
  db:
    image: postgres:16
    container_name: dogtracker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dogtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: dogtracker-backend
    working_dir: /app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    command:
      - sh
      - -c
      - |
        uv run python -m scripts.validate_env &&
        uv run uvicorn src.api.main:api --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

  lint:
    build: .
    container_name: dogtracker-lint
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
      - /app/.venv
    command: 
      - sh
      - -c
      - |
        uv run ruff check .

  test:
    build: .
    container_name: dogtracker-backend-test
    working_dir: /app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
      - /app/.venv
    command:
      - sh
      - -c
      - |
        uv run python -m scripts.validate_env &&
        uv run pytest -s -vv

volumes:
  postgres_data: