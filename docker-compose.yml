services:
  db:
    image: postgres:16
    container_name: dogtracker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dogtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: dogtracker-backend
    working_dir: /app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    command:
      - sh
      - -c
      - |
        uv run python -m scripts.validate_env &&
        uv run uvicorn src.api.main:api --host 0.0.0.0 --port 8000
    depends_on:
      - db
      - spark

  simulator:
    build: .
    container_name: dogtracker-simulator
    working_dir: /app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - BACKEND_BASE_URL=http://app:8000
      - SIM_STATE_PATH=/app/runtime/sim_state.json
    volumes:
      - .:/app
      - /app/.venv
    command:
      - sh
      - -c
      - |
        uv run python -m simulator.run_simulator
    depends_on:
      - app
      - db

  frontend:
    build: .
    container_name: dogtracker-frontend
    working_dir: /app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - BACKEND_BASE_URL=http://app:8000
      - SIM_STATE_PATH=/app/runtime/sim_state.json
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8501:8501"
    command:
      - sh
      - -c
      - |
        uv run streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501
    depends_on:
      - app
      - simulator
      - db
      - dbt

  spark:
    image: bitnami/spark:3.5
    container_name: dogtracker-spark
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - SPARK_MODE=client
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=dogtracker
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    volumes:
      - .:/app
    depends_on:
      - db
    command:
      - bash
      - -c
      - |
        /opt/bitnami/spark/bin/spark-submit \
        --packages org.postgresql:postgresql:42.7.3 \
        src/jobs/duplicate_detection_job.py

  dbt:
    build: .
    container_name: dogtracker-dbt
    working_dir: /app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8080:8080"
    command:
      - sh
      - -c
      - |
        uv run python -m scripts.run_dbt_loop
    depends_on:
      - db

  lint:
    build: .
    container_name: dogtracker-lint
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
      - /app/.venv
    command: 
      - sh
      - -c
      - |
        uv run ruff check .

  test:
    build: .
    container_name: dogtracker-backend-test
    working_dir: /app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
      - /app/.venv
    command:
      - sh
      - -c
      - |
        uv run python -m scripts.validate_env &&
        uv run pytest -s -vv &&
        uv run python -m scripts.run_dbt_tests

volumes:
  postgres_data: